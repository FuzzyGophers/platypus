#
# cbindgen config for the Platypus C ABI header. The header is a GENERATED product
# of this crate's `#[no_mangle] extern "C"` fns + `#[repr(C)]` types — never edited by
# hand. Regenerate with `just gen-header` (writes include/platypus.h). Keeping the
# header in-tree lets the Swift package build from a fresh checkout; CI verifies it is
# in sync (`just gen-header && git diff --exit-code`).
#
# cbindgen (MPL-2.0) is a dev-time CLI tool, deliberately NOT a build-dependency, so it
# stays out of the Cargo dependency graph and deny.toml's allow-list.

language = "C"
style = "type"
include_guard = "PLATYPUS_H"
pragma_once = false
cpp_compat = true
documentation = true
documentation_style = "c"
tab_width = 4
usize_is_size_t = true
line_length = 96

header = """/* SPDX-License-Identifier: GPL-2.0-only */
/* Copyright (C) 2026 The Platypus Authors */
/* Platypus FFI — C ABI over platypus-core.
 *
 * GENERATED by cbindgen from crates/platypus-ffi/src/lib.rs — do NOT edit by hand.
 * Regenerate with `just gen-header`.
 *
 * Memory: every char* returned by a *_json function is owned by Rust; release it with
 * platypus_string_free. Every opaque handle (PlatypusHpdb*, PlatypusLibrary*, …) has a
 * matching *_free/_close. All functions tolerate null arguments. */"""

# Emit declarations in source order so the header reads like the crate (not alphabetized).
sort_by = "None"

[parse]
parse_deps = false
