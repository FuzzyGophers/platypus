version = 1

# Source files carry their own inline SPDX + copyright headers. This declares
# licensing for everything else (manifests, config, docs, data fixtures, art,
# binaries) so the whole repo is REUSE-compliant. Run `reuse lint` to check.

[[annotations]]
path = [
  "Cargo.toml",
  "Cargo.lock",
  "crates/**/Cargo.toml",
  "rust-toolchain.toml",
  "deny.toml",
  "REUSE.toml",
  ".gitignore",
  "AUTHORS",
  "LICENSE",
  "apps/PlatypusMac/Package.swift",
  "apps/PlatypusMac/Info.plist",
  "apps/PlatypusMac/Sources/CPlatypusFFI/include/module.modulemap",
  "**/*.md",
  "assets/**",
  "samples/**",
  "crates/platypus-rr/tests/fixtures/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "The Platypus Authors"
SPDX-License-Identifier = "GPL-2.0-only"

# Bundled pixel fonts for the SDS150 display preview — third-party, OFL-1.1 (redistributable,
# GPL-compatible as an aggregate). Substitutes for the proprietary on-scanner bitmap font.
[[annotations]]
path = [
  "apps/PlatypusMac/Sources/PlatypusMac/Resources/Fonts/Silkscreen-Regular.ttf",
  "apps/PlatypusMac/Sources/PlatypusMac/Resources/Fonts/Silkscreen-Bold.ttf",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright 2001 The Silkscreen Project Authors (https://github.com/googlefonts/silkscreen)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = ["apps/PlatypusMac/Sources/PlatypusMac/Resources/Fonts/PixelifySans.ttf"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright 2021 The Pixelify Sans Project Authors (https://github.com/eifetx/Pixelify-Sans)"
SPDX-License-Identifier = "OFL-1.1"
