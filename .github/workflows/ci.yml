#
# Two independent fronts, mirroring the local build system: the Rust engine (plain cargo +
# the cbindgen header gate) and the macOS app (driven by `just`). See the root + app justfiles.
name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-gate:
    name: Rust engine — gate + license + links + header
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Reads the pinned channel + components from rust-toolchain.toml (single source).
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features

      - name: REUSE compliance
        uses: fsfe/reuse-action@v5

      # `--all-features` so the optional `http` transport's tree is checked too — this is where
      # the scoped `openssl` (Apache-2.0) license exception in deny.toml gets validated on Linux.
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features

      - name: link check (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress "**/*.md"
          fail: true

      # The C ABI header is a cbindgen product; fail if the committed copy is stale.
      # Prebuilt cbindgen (seconds) instead of `cargo install` (a 1–2 min compile each run).
      - name: install cbindgen
        uses: taiki-e/install-action@v2
        with:
          tool: cbindgen
      - name: C header is up to date
        run: |
          cbindgen --config crates/platypus-ffi/cbindgen.toml \
            --output crates/platypus-ffi/include/platypus.h crates/platypus-ffi
          git diff --exit-code -- crates/platypus-ffi/include/platypus.h

  mac-build:
    name: macOS app — build + smoke
    runs-on: macos-latest
    env:
      # macos-latest ships an untrusted `aws/tap`; we install nothing from it. Skip Homebrew's
      # tap-trust check so brew doesn't emit the notice (the linux job has no such tap).
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - uses: actions/checkout@v5

      # Reads the pinned channel from rust-toolchain.toml (single source).
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # Prebuilt `just` (Node 24; no brew, so the runner's untrusted taps stay out of it).
      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # Compile + offline-test the RR `http` transport on its native macOS TLS backend (Secure
      # Transport); the Linux rust-gate already covers the OpenSSL backend via --all-features.
      - name: platypus-rr http transport (native TLS)
        run: cargo test -p platypus-rr --features http

      # Build the release FFI staticlib + the Swift app, run the Swift unit tests, and the
      # headless Swift -> FFI -> core smoke against the synthetic fixtures.
      - name: Build app
        run: just app::build
      - name: Swift unit tests
        run: just app::test
      - name: Headless smoke
        run: just app::smoke
